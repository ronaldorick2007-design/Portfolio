<body>

<header class="header">

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="codes.html">Codes</a>

<div class="layout">
<aside>
<h3>General</h3>

<footer class="footer">
    <h1>Thank you</h1>
</footer>

<script src="gridPlane.js"></script>

<script>
  const content=document.getElementById('content');
async function load(){
 const page=location.hash.slice(1)||'welcome';
 const r=await fetch('data/'+page+'.html');
 content.innerHTML=await r.text();
 document.querySelectorAll('aside a').forEach(a=>a.style.background='');
 const active=document.querySelector(`aside a[href="#${page}"]`);
 if(active) active.style.background='green';
}
window.addEventListener('hashchange',load);
load();


</script>

</body>
